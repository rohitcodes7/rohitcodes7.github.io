<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rohit Kumar Das | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
      color: white;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
    }

    nav h1 {
      color: #00ff88;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
    }

    /* HERO */
    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
      text-align: center;
      padding: 20px;
    }

    .hero-content {
      max-width: 700px;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .hero span {
      color: #00ff88;
    }

    .hero h2 {
      margin-top: 10px;
      color: #00ff88;
    }

    .hero p {
      margin-top: 15px;
      line-height: 1.6;
      color: #cbd5f5;
    }

    .buttons {
      margin-top: 25px;
    }

    .buttons a {
      padding: 10px 20px;
      margin: 10px;
      border: 2px solid #00ff88;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      display: inline-block;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: #00ff88;
      color: black;
    }

    /* PROJECTS */
    .projects {
      text-align: center;
      padding: 60px 20px;
    }

    .projects h2 {
      font-size: 2rem;
    }

    /* CONTACT */
    .contact {
      text-align: center;
      padding: 60px 20px;
    }

    .contact h2 {
      font-size: 2rem;
    }

    .contact-box {
      margin: 30px auto;
      padding: 30px;
      max-width: 500px;
      border: 2px solid #00ff88;
      border-radius: 15px;
      backdrop-filter: blur(10px);

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .contact-content {
      width: 100%;
    }

    .contact-content p {
      margin: 10px 0;
      font-size: 1rem;
    }

    .contact-buttons {
      margin-top: 20px;
    }

    .contact-buttons button,
    .contact-buttons a {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 8px;
      border: 2px solid #00ff88;
      background: transparent;
      color: white;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .contact-buttons button:hover,
    .contact-buttons a:hover {
      background: #00ff88;
      color: black;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }

  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <h1>Rohit.</h1>
    <div>
      <a href="#">Home</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Hello, I'm <span>Rohit Kumar Das</span></h1>
      <h2>Web Developer</h2>
